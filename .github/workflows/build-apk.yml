name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package.json') }}
          restore-keys: node-modules-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias needhomes \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass needhomes123 \
            -keypass needhomes123 \
            -dname "CN=NeedHomes, OU=Mobile, O=NeedHomes, L=Lagos, ST=Lagos, C=NG"

      - name: Build release APK
        run: |
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=needhomes123 \
            -Pandroid.injected.signing.key.alias=needhomes \
            -Pandroid.injected.signing.key.password=needhomes123

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: needhomes-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
