name: Build Debug APK (Manual)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build from
        required: false
        default: main

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Prebuild Android project
        run: bunx expo prebuild --platform android --no-install

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Generate dummy keystore
        # expo prebuild generates a signing config block that reads a keystore path at
        # configuration time — Gradle crashes with a null pointer if the file is missing,
        # even for debug builds that never use release signing.
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias needhomes \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass needhomes123 \
            -keypass needhomes123 \
            -dname "CN=NeedHomes, OU=Mobile, O=NeedHomes, L=Lagos, ST=Lagos, C=NG"

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: needhomes-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
